<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Использование float при построении горизонтального меню</title>
    <style>
        .menu {
            list-style: none;
            margin: 0;
            padding: 10px;
            overflow: hidden; /* Решает проблему с высотой родителя */
        }
        .menu li {
            float: left; /* Располагаем элементы горизонтально */
        }
        .menu li a {
            display: block;
            padding: 10px 20px; /* Увеличили горизонтальные отступы */
            background: #ccf;
            text-decoration: none; /* Убираем подчёркивание ссылок */
            color: #333; /* Задаём цвет текста */
        }
        .menu li a:hover {
            background: #99c; /* Эффект при наведении */
        }
    </style>
</head>
<body>
    <ul class="menu">
        <li><a href="#">Пункт 1</a></li>
        <li><a href="#">Пункт 2</a></li>
        <li><a href="#">Пункт 3</a></li>
        <li><a href="#">Пункт 4</a></li>
        <li><a href="#">Пункт 5</a></li>
    </ul>
</body>
</html>
